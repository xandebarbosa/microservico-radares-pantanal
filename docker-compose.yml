networks:
  radares-net:
    external: true

services:

  # ═══════════════════════════════════════════════
  #  MICROSSERVIÇO — Radar Pantanal (Quarkus)
  # ═══════════════════════════════════════════════
  quarkus-radar-pantanal:
    container_name: quarkus-radares-pantanal
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      - QUARKUS_PROFILE=prod

      # ── MongoDB ───────────────────────────────
      - MONGODB_URI=mongodb:${URI_MONGODB}
      - MONGODB_DATABASE=${DATABASE_MONGODB}

      # ── RabbitMQ ──────────────────────────────
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - rabbitmq.exchange.name=radares_exchange
      - rabbitmq.routing.key=radares.pantanal

      # ── CORS ──────────────────────────────────
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    networks:
      - radares-net
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s